# Flight Meetup Finder — single-service deployment (N-1, N-2, N-3, N-4).
# `docker compose up -d --build` is the only deploy step. Created 2026-06-09.
services:
  app:
    build: .
    image: flight-meetup-finder
    container_name: flight-meetup-finder
    ports:
      - "${APP_PORT:-8742}:8000"
    env_file: .env
    volumes:
      - fmf-data:/data
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  fmf-data:
